; Agent's Optimization Mod v2.0 - Scalability Overrides
; All quality presets optimized for better FPS while preserving visual quality progression
; Changes marked with ; [OPT] comments

[ScalabilitySettings]
PerfIndexValues_ResolutionQuality="100 100 100 100 100"

; === FOLIAGE - Biggest FPS impact in Icarus forests ===
[FoliageQuality@0]
foliage.MinimumScreenSize=0.02			; [OPT] was 0.0125 - cull small foliage sooner
foliage.LODDistanceScale=0.35			; [OPT] was 0.5 - tighter LOD transitions
foliage.DensityScale=0.4				; [OPT] was 0.7 - major FPS gain
grass.DensityScale=0.35				; [OPT] was 0.7 - half the grass draw calls

[FoliageQuality@1]
foliage.MinimumScreenSize=0.018			; [OPT] was 0.01125
foliage.LODDistanceScale=0.5			; [OPT] was 0.75
foliage.DensityScale=0.5				; [OPT] was 0.8
grass.DensityScale=0.45				; [OPT] was 0.8

[FoliageQuality@2]
foliage.MinimumScreenSize=0.015			; [OPT] was 0.01075
foliage.LODDistanceScale=0.7			; [OPT] was 1.0
foliage.DensityScale=0.6				; [OPT] was 0.9
grass.DensityScale=0.55				; [OPT] was 0.9

[FoliageQuality@3]
foliage.MinimumScreenSize=0.012			; [OPT] was 0.01
foliage.LODDistanceScale=0.9			; [OPT] was 1.5 - still looks great
foliage.DensityScale=0.7				; [OPT] added - was unset (defaulted to 1.0)
grass.DensityScale=0.65				; [OPT] added - was unset (defaulted to 1.0)

; === ANTI-ALIASING - Unchanged ===
[AntiAliasingQuality@0]
r.PostProcessAAQuality=2

[AntiAliasingQuality@1]
r.PostProcessAAQuality=3

; === VIEW DISTANCE - Tighter culling saves draw calls ===
[ViewDistanceQuality@0]
r.SkeletalMeshLODBias=1				; [OPT] was 0 - skip highest LOD on low
r.ViewDistanceScale=0.55				; [OPT] was 0.7

[ViewDistanceQuality@1]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=0.65				; [OPT] was 0.8

[ViewDistanceQuality@2]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=0.75				; [OPT] was 0.9

; === POST PROCESSING ===
[PostProcessQuality@0]
r.BloomQuality=1						; [OPT] was 2

[PostProcessQuality@1]
r.AmbientOcclusionRadiusScale=0.8		; [OPT] was 1
r.BloomQuality=2						; [OPT] was 3

[PostProcessQuality@2]
r.AmbientOcclusionMaxQuality=50			; [OPT] was 70
r.AmbientOcclusionRadiusScale=0.9		; [OPT] was 1
r.BloomQuality=2						; [OPT] was 3

[PostProcessQuality@3]
r.BloomQuality=3						; [OPT] was 4

; === SHADOWS - Major FPS impact ===
[ShadowQuality@0]
r.ShadowQuality=1
r.ContactShadows=0						; [OPT] was 1 - expensive on low
r.Shadow.MaxNumFarShadowCascades=0
r.LightMaxDrawDistanceScale=0.7			; [OPT] was 0.9
r.VolumetricFog=0						; [OPT] was 1 - disable fog on low
r.VolumetricFog.GridPixelSize=64			; [OPT] was 32
r.VolumetricFog.GridSizeZ=64			; [OPT] was 128
r.VolumetricFog.HistoryMissSupersampleCount=1	; [OPT] was 2

[ShadowQuality@1]
r.LightFunctionQuality=0
r.ShadowQuality=2
r.Shadow.MaxResolution=1024				; [OPT] was 2048
r.Shadow.MaxCSMResolution=1024			; [OPT] was 2048
r.ContactShadows=0						; [OPT] was 1
r.LightMaxDrawDistanceScale=0.75		; [OPT] was 0.95
r.VolumetricFog=1
r.VolumetricFog.GridPixelSize=48			; [OPT] was 16 - huge FPS save
r.VolumetricFog.GridSizeZ=48			; [OPT] was 64
r.VolumetricFog.HistoryMissSupersampleCount=2	; [OPT] was 4

[ShadowQuality@2]
r.ContactShadows=1
r.Shadow.CSM.MaxCascades=2				; [OPT] was 3
r.ShadowQuality=3
r.Shadow.DistanceScale=0.50				; [OPT] was 0.70
r.Shadow.MaxResolution=2048				; [OPT] added explicit cap
r.Shadow.MaxCSMResolution=2048			; [OPT] added explicit cap
r.AOQuality=1							; [OPT] was 2
r.AmbientOcclusionLevels=1
r.VolumetricFog.GridPixelSize=24			; [OPT] added
r.VolumetricFog.GridSizeZ=48			; [OPT] added

[ShadowQuality@3]
r.ShadowQuality=3
r.Shadow.CSM.MaxCascades=3				; [OPT] was 4
r.Shadow.MaxResolution=2048				; [OPT] was 4096
r.Shadow.MaxCSMResolution=2048			; [OPT] was 4096
r.Shadow.DistanceScale=0.65				; [OPT] added
r.AOQuality=2
r.AmbientOcclusionLevels=1
r.ContactShadows=1
r.VolumetricFog.GridPixelSize=20			; [OPT] added
r.VolumetricFog.GridSizeZ=64			; [OPT] added

[ShadowQuality@Cine]
r.ShadowQuality=3
r.Shadow.CSM.MaxCascades=4				; [OPT] was 5
r.Shadow.MaxResolution=4096
r.Shadow.MaxCSMResolution=4096
r.AmbientOcclusionLevels=1
r.ContactShadows=1

; === TEXTURES - Optimize streaming pools ===
[TextureQuality@0]
r.Streaming.PoolSize=1500				; [OPT] was 2000
r.VT.RVT.TileCountBias=-2				; [OPT] was -1

[TextureQuality@1]
r.Streaming.PoolSize=3000				; [OPT] was 4000
r.VT.RVT.TileCountBias=-1

[TextureQuality@2]
r.Streaming.PoolSize=6000				; [OPT] was 8000
r.VT.RVT.TileCountBias=0

[TextureQuality@3]
r.Streaming.PoolSize=8000				; [OPT] was 10000
r.VT.RVT.TileCountBias=0

[TextureQuality@Cine]
r.Streaming.PoolSize=10000				; [OPT] was 12000
r.VT.RVT.TileCountBias=0
