name: Update Site

on:
  push:
    branches: [main]
    paths:
      - '*/*.EXMOD'
      - '*/*.EXMODZ'
      - 'modinfo.json'
      - 'docs/categories.json'

  workflow_dispatch:

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rebuild site
        run: python3 docs/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/script.js docs/categories.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update site: sync mod data"
          git push
