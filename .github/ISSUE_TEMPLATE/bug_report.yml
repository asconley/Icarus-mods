---
name: Bug Report
description: Report a bug with a mod
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: mod
    attributes:
      label: Which mod?
      options:
        - Absolute Chaos - Core
        - Agent's BioLab
        - Agents Individual Item Kits
        - Always Show Buildings On Map
        - Ammo Crafting Overhaul
        - Armor Set Bonuses Enhanced
        - Bestiary Fix
        - Creature Difficulty Scaling
        - Creature Drop Enhancer
        - Culinex Food Boost Fix
        - Dev Tools Kit
        - Exotic Economy Overhaul
        - Extended Spoil Timers
        - Extended Wire and Pipe Tool
        - Fast Processing (5x)
        - Fast Processing (10x)
        - Fast Processing (15x)
        - Fast Processing (25x)
        - Fast Processing (Instant)
        - Faster Crafting
        - Fish and Farming Boost
        - Hardcore Rebalance Pack
        - Hidden Building Pieces
        - Indestructible Tools & Weapons
        - Modular Affliction Adjuster
        - Modular Buff Enhancer
        - More Eye Colours
        - Night Vision Goggles
        - No Food Spoilage
        - Passive Ore Extractor Drills
        - Performance Optimizer
        - Solar Panel Expansion
        - Stack Size Overhaul
        - Tier Upgrade Forge
        - Trap and Defense Expansion
        - Turret Variants
        - Waste Not
        - Workshop Recyclers
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mod version
      placeholder: "e.g. v5.3"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug - what did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install mod
        2. Open workshop
        3. ...
    validations:
      required: false
  - type: dropdown
    id: multiplayer
    attributes:
      label: Singleplayer or Multiplayer?
      options:
        - Singleplayer
        - Multiplayer (Host)
        - Multiplayer (Client)
        - Dedicated Server
    validations:
      required: true
  - type: textarea
    id: other-mods
    attributes:
      label: Other mods installed
      placeholder: List any other mods you're running alongside this one
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      placeholder: Paste screenshots or error logs here
    validations:
      required: false
