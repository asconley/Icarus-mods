---
name: Compatibility Issue
description: Report a conflict between mods
title: "[Compat] "
labels: ["compatibility"]
body:
  - type: input
    id: mod1
    attributes:
      label: First mod
      placeholder: "e.g. Workshop Recyclers v5.3"
    validations:
      required: true
  - type: input
    id: mod2
    attributes:
      label: Conflicting mod
      placeholder: "e.g. Another mod name + version"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What's the conflict?
      placeholder: Describe what breaks when both mods are installed together
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Mod Manager merge log
      placeholder: Paste the merge output from JimK72's Mod Manager if available
    validations:
      required: false
