; UE4SS Settings - Configured for Icarus (UE4.26 Shipping Build)
; Place this file in: Icarus/Binaries/Win64/ alongside UE4SS.dll

[Overrides]
; Path to mods folder (relative to this file)
ModsFolderPath = Mods

[General]
bUseUObjectArrayCache = true
; Enable hot reload with Ctrl+R for rapid iteration
bEnableHotReloadSystem = true
; Scan timeout in seconds - increase if Icarus takes long to load
SecondsToScanBeforeGivingUp = 60

[EngineVersionOverride]
; Icarus uses UE4.26 - leave at 0 for auto-detection
; Only set manually if auto-detect fails
MajorVersion = 0
MinorVersion = 0

[ObjectDumper]
LoadAllAssetsBeforeDumpingObjects = false

[CXXHeaderGenerator]
DumpOffsetsAndSizes = true
KeepMemoryLayout = true
MakeAllPropertyBlueprintVisible = true

[UHTHeaderGenerator]
MakeAllPropertyBlueprintVisible = true
MakeAllFunctionsBlueprintCallable = true
MakeEnumClassesBlueprintType = true
MakeAllConfigsEngineConfig = false

[Debug]
; Set to 1 to see the UE4SS debug console window
; IMPORTANT: Set to 0 on dedicated servers (no GUI available)
ConsoleEnabled = 1
GuiConsoleEnabled = 1
GuiConsoleVisible = 1
; Graphics API - OpenGL is most compatible
GraphicsAPI = opengl

[Threads]
SigScannerNumThreads = 8
SigScannerMultithreadingModuleSize = 8388608

[Memory]
MaxMemoryUsageDuringAssetLoading = 85

[Hooks]
HookProcessInternal = true
HookProcessLocalScriptFunction = true
HookInitGameState = true
HookCallFunctionByNameWithArguments = true
HookBeginPlay = true
HookLocalPlayerExec = true
; FName constructor hooks - enable for object tracking
FName_Constructor_Lambda_Enabled = false

[CrashDump]
EnableDumping = true

[ExperimentalFeatures]
